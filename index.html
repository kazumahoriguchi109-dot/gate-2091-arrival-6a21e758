<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="7つの密室を抜けるPC向け謎解きサイト。部屋ごとにルールが変わり、最後に未来の楽園へたどり着く。"
    />
    <meta name="theme-color" content="#071018" />
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet" />
    <title>7 Rooms / 7 Doors</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:wght@400;500;600&family=Shippori+Mincho:wght@400;500;600;700&display=swap"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-view="title">
    <section id="title-screen" class="title-screen" aria-labelledby="title-heading">
      <img
        class="title-background-image"
        src="assets/figma-bg/title.png"
        alt=""
        aria-hidden="true"
      />
      <div class="title-fog" aria-hidden="true"></div>
      <h1 id="title-heading" class="sr-only">7 Rooms / 7 Doors</h1>

      <div class="title-menu-block">
        <nav class="title-menu" aria-label="タイトルメニュー">
          <button
            id="start-game-button"
            class="title-menu-button title-menu-button-primary"
            type="button"
          >
            はじめる
          </button>
          <button id="continue-game-button" class="title-menu-button" type="button">
            途中から
          </button>
          <button
            id="settings-button"
            class="title-menu-button"
            type="button"
            aria-controls="settings-panel"
            aria-expanded="false"
          >
            設定
          </button>
        </nav>

        <section id="settings-panel" class="title-settings" hidden>
          <p class="title-settings-copy">音と進行状況の管理</p>
          <div class="title-settings-actions">
            <button id="title-audio-toggle" class="ghost-button" type="button">
              BGM OFF
            </button>
            <button id="title-clear-save-button" class="ghost-button" type="button">
              セーブ削除
            </button>
          </div>
        </section>

        <div class="title-progress">
          <p class="title-progress-label">Save Status</p>
          <p id="title-save-status" class="title-progress-value">新規プレイ</p>
        </div>
      </div>
    </section>

    <div class="app-shell">
      <main class="experience">
        <section class="playfield">
          <div class="scene-frame">
            <div id="scene-art" class="scene-art stage-intro">
              <img
                id="scene-illustration"
                class="scene-illustration"
                src="assets/figma-bg/prologue.png"
                alt=""
                aria-hidden="true"
              />
              <div class="scene-wash" aria-hidden="true"></div>
              <div class="scene-vignette" aria-hidden="true"></div>
              <div id="transition-veil" class="transition-veil" aria-hidden="true"></div>
            </div>

            <header class="scene-topbar">
              <div class="scene-heading">
                <p id="stage-label" class="scene-stage-label">Prologue</p>
                <h2 id="stage-title" class="scene-stage-title">閉じた世界のはじまり</h2>
                <div class="scene-stage-meta">
                  <span id="theme-chip" class="meta-chip">導入</span>
                  <span id="rule-chip" class="meta-chip">ルール説明</span>
                  <span id="stage-counter" class="meta-chip">0 / 7 Rooms</span>
                </div>
              </div>
              <button
                id="menu-toggle"
                class="menu-toggle"
                type="button"
                aria-controls="menu-drawer"
                aria-expanded="false"
              >
                <span></span>
                <span></span>
                <span></span>
                <span class="sr-only">メニューを開く</span>
              </button>
            </header>

            <button id="door-button" class="door-button" type="button" hidden disabled>
              <span class="door-button-orbit" aria-hidden="true"></span>
              <span class="door-button-core"></span>
              <span class="door-button-text">扉を調べる</span>
            </button>

            <p id="door-prompt" class="door-prompt" hidden>テキストが終わった。扉に触れて先へ進む。</p>

            <button
              id="narrative-window"
              class="narrative-window"
              type="button"
              aria-live="polite"
            >
              <div class="narrative-header">
                <span id="window-kicker">Narrative</span>
                <span id="message-progress">1 / 1</span>
              </div>
              <p id="narrative-message" class="narrative-message">
                7部屋構成の完成版。最初はただの脱出に見えても、抜けるたびに世界の正体が見えてくる。
              </p>
              <p id="narrative-next" class="narrative-next">クリックで続く</p>
            </button>

            <div id="menu-scrim" class="menu-scrim" hidden></div>

            <aside id="menu-drawer" class="menu-drawer" aria-hidden="true">
              <div class="menu-drawer-inner">
                <div class="menu-drawer-header">
                  <div>
                    <p class="drawer-eyebrow">Memory Trial</p>
                    <h3>記憶ログ</h3>
                  </div>
                  <button id="menu-close-button" class="menu-close-button" type="button">
                    <span aria-hidden="true">×</span>
                    <span class="sr-only">メニューを閉じる</span>
                  </button>
                </div>

                <section class="drawer-card drawer-card-logbook">
                  <div class="panel-header">
                    <span>Recovered Logs</span>
                    <span id="logbook-status" class="logbook-status">まだ記録はない</span>
                  </div>
                  <div id="memo-list" class="memo-list"></div>
                </section>

                <section class="drawer-grid">
                  <div class="drawer-card">
                    <p class="drawer-eyebrow">Save</p>
                    <p id="save-status" class="save-value">新規プレイ</p>
                  </div>
                  <div class="drawer-card">
                    <p class="drawer-eyebrow">Setting</p>
                    <div class="drawer-control-row">
                      <button id="audio-toggle" class="ghost-button" type="button">
                        BGM OFF
                      </button>
                      <button id="clear-save-button" class="ghost-button" type="button">
                        セーブ削除
                      </button>
                    </div>
                  </div>
                </section>

                <button id="reset-button" class="drawer-return-button" type="button">
                  タイトルに戻る
                </button>
              </div>
            </aside>

            <section id="puzzle-overlay" class="puzzle-overlay" hidden>
              <div class="puzzle-backdrop" aria-hidden="true"></div>
              <div class="puzzle-panel">
                <div class="puzzle-panel-header">
                  <div>
                    <p id="puzzle-kicker" class="puzzle-kicker">Trial</p>
                    <h3 id="puzzle-title">第1試験</h3>
                  </div>
                  <button id="close-puzzle-button" class="puzzle-close-button" type="button">
                    戻る
                  </button>
                </div>

                <div id="puzzle-body" class="puzzle-body"></div>

                <div class="hint-box">
                  <p class="hint-label">Hint</p>
                  <p id="hint-text">行き詰まったら、その部屋だけにある読み方を疑う。</p>
                </div>

                <form id="answer-form" class="answer-box">
                  <label for="answer-input" id="prompt-text">答えを入力</label>
                  <div class="answer-row">
                    <input
                      id="answer-input"
                      name="answer"
                      type="text"
                      autocomplete="off"
                      spellcheck="false"
                      inputmode="text"
                    />
                    <button type="submit" class="primary-button">送信</button>
                  </div>
                  <div class="action-row">
                    <button id="hint-button" type="button" class="ghost-button">
                      ヒントを見る
                    </button>
                  </div>
                </form>

                <div id="feedback" class="feedback" aria-live="polite"></div>
              </div>
            </section>
          </div>
        </section>
      </main>
    </div>

    <dialog id="ending-dialog" class="ending-dialog">
      <div class="dialog-inner">
        <p id="ending-kind" class="eyebrow">Ending</p>
        <h2 id="ending-title"></h2>
        <p id="ending-text"></p>
        <div class="dialog-actions">
          <button id="dialog-primary" class="primary-button" type="button">
            つづける
          </button>
          <button id="dialog-secondary" class="ghost-button" type="button">
            タイトルへ
          </button>
        </div>
      </div>
    </dialog>

    <script src="script.js"></script>
  </body>
</html>
